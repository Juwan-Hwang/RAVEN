
# ───────────────────────────────────────────────────────────────────────
# RAVEN Clippy 规则配置
#
# 策略：all + pedantic + nursery + restriction 四分组一键全开（~400 条规则），
#       再排除对高性能 HNSW 项目有害或无收益的规则。
#
# 以下配置已直接写入 Cargo.toml 的 [lints] 表，本文件仅作文档参考。
# ───────────────────────────────────────────────────────────────────────

[lints.rust]
unused_crate_dependencies = "allow"

[lints.clippy]
# ── 四分组一键全开 ──
all         = { level = "deny", priority = -1 }  # correctness + suspicious + style + complexity + perf
pedantic    = { level = "deny", priority = -1 }  # ~170 条极致优化规则
nursery     = { level = "deny", priority = -1 }  # ~50 条实验性规则
restriction = { level = "deny", priority = -1 }  # ~90 条限制规则

# ── 排除：有害（损害性能）──
inline_always = "allow"              # 热路径必须 #[inline(always)]
as_conversions = "allow"             # SIMD 指针 cast、usize→u32 全靠 as
arithmetic_side_effects = "allow"    # 高性能库不能用 checked_*
integer_division = "allow"
float_arithmetic = "allow"
modulo_arithmetic = "allow"
indexing_slicing = "allow"           # 热路径用 get_unchecked 绕过边界检查

# ── 排除：无收益（零性能影响）──
missing_const_for_fn = "allow"       # const fn 对运行时零收益

# Cast 类
cast_possible_truncation = "allow"
cast_possible_wrap = "allow"
cast_sign_loss = "allow"
cast_precision_loss = "allow"
cast_lossless = "allow"
cast_ptr_alignment = "allow"
ptr_as_ptr = "allow"
borrow_as_ptr = "allow"
ref_as_ptr = "allow"
ptr_cast_constness = "allow"

# 纯文档类
missing_errors_doc = "allow"
missing_panics_doc = "allow"
missing_safety_doc = "allow"
missing_fields_in_debug = "allow"
missing_docs_in_private_items = "allow"
missing_inline_in_public_items = "allow"
doc_markdown = "allow"
doc_link_with_quotes = "allow"
doc_broken_link = "allow"
doc_lazy_continuation = "allow"
doc_overindented_list_items = "allow"
doc_paragraphs_missing_punctuation = "allow"

# 纯命名/风格类
