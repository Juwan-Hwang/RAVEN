float:
  any:
  - base_args: ['@metric', '@dimension']
    constructor: Raven
    disabled: false
    docker_tag: ann-benchmarks-raven
    module: ann_benchmarks.algorithms.raven
    name: raven
    run_groups:
      # ═══ 主力提交：SQ4（全区间 Pareto 优越） ═══
      # recall 0.94-0.99，SQ4 在整条曲线上 QPS 更高且 recall 损失随 ef 收敛
      # ef=50: +11% QPS, recallΔ=-0.38pp | ef=100: +10% QPS, recallΔ=-0.12pp
      # 内存 64MB（vs SQ8 128MB），带宽减半
      raven-sq4:
        args:
          R: 32
          L: 200
          alpha: 1.2
          nav_m: 32
          directional: true
          quantization: sq4
          rerank_factor: 8
        query_args:
          ef_search: [40, 45, 50, 55, 65, 70, 80, 100]

      # ═══ 多线程峰值：SQ4 + 16 threads ═══
      raven-sq4-mt:
        args:
          R: 32
          L: 200
          alpha: 1.2
          nav_m: 32
          directional: true
          quantization: sq4
          rerank_factor: 8
          threads: 16
        query_args:
          ef_search: [50]

      # ═══ 保底提交：SQ8（让榜单自动取包络） ═══
      raven-sq8:
        args:
          R: 32
          L: 200
          alpha: 1.2
          nav_m: 32
          directional: true
          quantization: sq8
          rerank_factor: 3
        query_args:
          ef_search: [40, 45, 50, 55, 65, 70, 80, 100]
