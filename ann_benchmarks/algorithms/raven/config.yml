float:
  any:
  - base_args: ['@metric', '@dimension']
    constructor: Raven
    disabled: false
    docker_tag: ann-benchmarks-raven
    module: ann_benchmarks.algorithms.raven
    name: raven
    run_groups:
      # 最优配置（全参数扫描确认）
      Vamana-opt:
        args:
          R: 32
          L: 200
          alpha: 1.2
          nav_m: 32
          directional: true
        query_args: [[40, 45, 50, 55, 60, 65, 70, 80, 100]]
      # 对比组：不同 R
      Vamana-R24:
        args:
          R: 24
          L: 200
          alpha: 1.2
          nav_m: 32
          directional: true
        query_args: [[40, 50, 60, 70, 100]]
      Vamana-R48:
        args:
          R: 48
          L: 200
          alpha: 1.2
          nav_m: 32
          directional: true
        query_args: [[40, 50, 60, 70, 100]]
