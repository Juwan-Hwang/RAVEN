float:
  any:
  - base_args: ['@metric', '@dimension']
    constructor: Raven
    disabled: false
    docker_tag: ann-benchmarks-raven
    module: ann_benchmarks.algorithms.raven
    name: raven
    run_groups:
      # 固定 ef 模式：8 个 ef 值，建图 1 次
      raven-sq4:
        args:
          R: 32
          L: 200
          alpha: 1.2
          nav_m: 32
          directional: true
          quantization: sq4
          rerank_factor: 5
          po: 16
        query_args: [[40, 45, 50, 55, 65, 70, 80, 100]]

      # Adaptive ef 模式：gamma × min_ef × max_ef 笛卡尔积
      # 合并原来的 3 个 run_group（35-65, 35-75, 35-85），建图 1 次
      raven-sq4-adaptive:
        args:
          R: 32
          L: 200
          alpha: 1.2
          nav_m: 32
          directional: true
          quantization: sq4
          rerank_factor: 5
          po: 16
          adaptive_ef: true
        query_args:
          - [3.5, 2.4, 2.2, 2.0, 2.3]
          - [35]
          - [65, 75, 85]

      # 多线程模式：16 线程，建图 1 次
      raven-sq4-mt:
        args:
          R: 32
          L: 200
          alpha: 1.2
          nav_m: 32
          directional: true
          quantization: sq4
          rerank_factor: 5
          po: 16
          threads: 16
        query_args: [[50]]
